<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipboardSync</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 标题栏 */
        .header {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        .header .device-id {
            font-size: 12px;
            color: #888;
        }
        /* Tab 栏 */
        .tabs {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }
        .tab:hover {
            color: #333;
            background: #f8f9fa;
        }
        .tab.active {
            color: #4a90d9;
            border-bottom-color: #4a90d9;
        }
        /* 工具栏 */
        .toolbar {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .search-wrapper {
            flex: 1;
            position: relative;
        }
        .search-wrapper input {
            width: 100%;
            padding: 8px 32px 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        .search-wrapper input:focus {
            border-color: #4a90d9;
        }
        .search-clear {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            font-size: 16px;
            display: none;
            padding: 2px;
        }
        .search-clear.visible {
            display: block;
        }
        .toolbar button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            background: #4a90d9;
            color: #fff;
            white-space: nowrap;
        }
        .toolbar button:hover {
            background: #3a7bc8;
        }
        .toolbar button.secondary {
            background: #eee;
            color: #333;
        }
        .toolbar button.secondary:hover {
            background: #ddd;
        }
        /* 主内容区 */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }
        /* 历史列表 */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .history-item {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: background 0.15s;
        }
        .history-item:hover {
            background: #f8f9fa;
        }
        .history-item .content-preview {
            flex: 1;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-all;
            max-height: 60px;
            overflow: hidden;
        }
        .history-item .content-preview.type-image {
            color: #666;
            font-style: italic;
        }
        .history-item .content-preview.type-file {
            color: #555;
        }
        .history-item .meta {
            font-size: 12px;
            color: #888;
            white-space: nowrap;
            margin-left: 12px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }
        .history-item .meta .source {
            color: #aaa;
        }
        .history-item .meta .source.remote {
            color: #4a90d9;
        }
        .history-item .actions {
            display: flex;
            gap: 4px;
            margin-left: 8px;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .history-item:hover .actions {
            opacity: 1;
        }
        .history-item .actions button {
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            background: #eee;
            color: #333;
            transition: background 0.15s;
        }
        .history-item .actions button:hover {
            background: #ddd;
        }
        .history-item .actions button.primary {
            background: #4a90d9;
            color: #fff;
        }
        .history-item .actions button.primary:hover {
            background: #3a7bc8;
        }
        .history-item .actions button.danger {
            background: #fee;
            color: #c33;
        }
        .history-item .actions button.danger:hover {
            background: #fdd;
        }
        /* 设备面板 */
        .device-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .device-section {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
        }
        .device-section h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .device-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .device-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: #f8f9fa;
            border-radius: 6px;
        }
        .device-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .device-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ccc;
        }
        .device-status.online {
            background: #4caf50;
        }
        .device-name {
            font-size: 14px;
            font-weight: 500;
        }
        .device-time {
            font-size: 12px;
            color: #888;
        }
        /* 配对区域 */
        .pairing-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .pairing-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .pairing-card h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .pairing-code {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #4a90d9;
            margin: 16px 0;
            font-family: monospace;
        }
        .pairing-countdown {
            font-size: 13px;
            color: #888;
            margin-top: 8px;
        }
        .pairing-input {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }
        .pairing-input input {
            width: 200px;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
        }
        .pairing-input input:focus {
            border-color: #4a90d9;
        }
        .pairing-input button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            background: #4a90d9;
            color: #fff;
        }
        .pairing-input button:hover {
            background: #3a7bc8;
        }
        .pairing-input button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        /* 状态栏 */
        .statusbar {
            background: #fff;
            border-top: 1px solid #e0e0e0;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
        }
        .statusbar .sync-status {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .statusbar .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }
        .statusbar .sync-dot.active {
            background: #4caf50;
        }
        .statusbar .right-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 48px;
            color: #888;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: #4caf50;
        }
        .toast.error {
            background: #f44336;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ClipboardSync</h1>
        <span class="device-id" id="deviceID">设备 ID: 加载中...</span>
    </div>

    <div class="tabs">
        <div class="tab active" data-panel="history" onclick="switchTab('history')">📋 历史记录</div>
        <div class="tab" data-panel="devices" onclick="switchTab('devices')">📱 设备管理</div>
    </div>

    <!-- 历史记录面板 -->
    <div class="panel active" id="panel-history">
        <div class="toolbar">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="搜索剪贴板历史... (⌘F)">
                <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
            </div>
            <button class="secondary" onclick="loadHistory()">刷新</button>
        </div>
        <div class="content">
            <div class="history-list" id="historyList">
                <div class="empty-state">
                    <div class="icon">📋</div>
                    <div>加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 设备管理面板 -->
    <div class="panel" id="panel-devices">
        <div class="content">
            <div class="device-panel">
                <!-- 发现的设备 -->
                <div class="device-section">
                    <h3>🔍 局域网设备</h3>
                    <p style="font-size: 13px; color: #666; margin-bottom: 12px;">
                        自动发现局域网内的 ClipboardSync 设备
                    </p>
                    <div class="device-list" id="discoveredList">
                        <div class="empty-state" style="padding: 24px;">
                            <div>正在搜索...</div>
                        </div>
                    </div>
                </div>

                <!-- 已配对设备列表 -->
                <div class="device-section">
                    <h3>📱 已配对设备</h3>
                    <div class="device-list" id="deviceList">
                        <div class="empty-state" style="padding: 24px;">
                            <div>暂无配对设备</div>
                        </div>
                    </div>
                </div>

                <!-- 配对功能 -->
                <div class="device-section">
                    <h3>🔗 设备配对</h3>
                    <div class="pairing-section">
                        <!-- 发起配对 -->
                        <div class="pairing-card">
                            <h4>生成配对码</h4>
                            <p style="font-size: 13px; color: #666; margin-bottom: 12px;">
                                生成配对码后，在另一台设备上输入此码完成配对
                            </p>
                            <div class="pairing-code" id="pairingCode" style="display: none;">------</div>
                            <div class="pairing-countdown" id="pairingCountdown" style="display: none;">
                                有效期: <span id="countdown">60</span> 秒
                            </div>
                            <button onclick="generatePairingCode()" id="generateBtn"
                                style="padding: 10px 24px; border: none; border-radius: 6px; background: #4a90d9; color: #fff; font-size: 14px; cursor: pointer; margin-top: 12px;">
                                生成配对码
                            </button>
                        </div>

                        <!-- 接受配对 -->
                        <div class="pairing-card">
                            <h4>输入配对码</h4>
                            <p style="font-size: 13px; color: #666; margin-bottom: 12px;">
                                输入另一台设备显示的 6 位配对码
                            </p>
                            <div class="pairing-input">
                                <input type="text" id="pairingInput" maxlength="6" placeholder="000000"
                                    oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                                <button onclick="acceptPairing()" id="acceptBtn">确认配对</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="statusbar">
        <div class="sync-status">
            <span class="sync-dot" id="syncDot"></span>
            <span id="syncStatus">同步未启动</span>
        </div>
        <div class="right-section">
            <span id="entryCount">0 条记录</span>
            <button onclick="toggleSync()" id="syncBtn" style="padding:4px 12px;border:none;border-radius:4px;background:#4a90d9;color:#fff;font-size:12px;cursor:pointer">启用同步</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/wails/runtime.js"></script>
    <script>
        let syncActive = false;
        let refreshTimer = null;
        let searchDebounceTimer = null;
        let currentEntries = [];
        let pairingCountdownTimer = null;
        let pairingCodeValue = '';
        let localDeviceID = '';

        // Tab 切换
        function switchTab(panel) {
            // 更新 Tab 样式
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.panel === panel);
            });
            // 更新面板显示
            document.querySelectorAll('.panel').forEach(p => {
                p.classList.toggle('active', p.id === 'panel-' + panel);
            });
            // 切换到设备面板时刷新设备列表
            if (panel === 'devices') {
                loadDevices();
                loadDiscoveredDevices();
            }
        }

        // 加载设备 ID
        async function loadDeviceID() {
            try {
                const id = await window.go.gui.App.GetDeviceID();
                localDeviceID = id;
                document.getElementById('deviceID').textContent = '设备 ID: ' + id.substring(0, 8) + '...';
            } catch (e) {
                console.error('获取设备 ID 失败:', e);
            }
        }

        // 加载历史
        async function loadHistory() {
            try {
                const entries = await window.go.gui.App.GetHistory(100);
                currentEntries = entries || [];
                renderHistory(currentEntries);
                updateEntryCount();
            } catch (e) {
                console.error('获取历史失败:', e);
                document.getElementById('historyList').innerHTML =
                    '<div class="empty-state"><div class="icon">⚠️</div><div>加载失败</div></div>';
            }
        }

        // 加载设备列表
        async function loadDevices() {
            try {
                const devices = await window.go.gui.App.GetDevices();
                renderDevices(devices || []);
            } catch (e) {
                console.error('获取设备列表失败:', e);
            }
        }

        // 加载发现的设备
        async function loadDiscoveredDevices() {
            try {
                const devices = await window.go.gui.App.GetDiscoveredDevices();
                renderDiscoveredDevices(devices || []);
            } catch (e) {
                console.error('获取发现设备失败:', e);
            }
        }

        // 渲染设备列表
        function renderDevices(devices) {
            const list = document.getElementById('deviceList');
            if (devices.length === 0) {
                list.innerHTML = '<div class="empty-state" style="padding: 24px;"><div>暂无配对设备</div></div>';
                return;
            }
            list.innerHTML = devices.map(device => {
                const isPaired = device.paired === true;
                const lastSeen = device.last_seen ? formatRelativeTime(device.last_seen) : '未知';
                return '<div class="device-item">' +
                    '<div class="device-info">' +
                        '<div class="device-status ' + (isPaired ? 'online' : '') + '"></div>' +
                        '<div>' +
                            '<div class="device-name">' + escapeHtml(device.display_name || '未命名设备') + '</div>' +
                            '<div class="device-time">最后在线: ' + lastSeen + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<button onclick="removeDevice(\'' + device.id + '\')" ' +
                        'style="padding: 4px 10px; border: none; border-radius: 4px; background: #fee; color: #c33; font-size: 12px; cursor: pointer;">' +
                        '移除</button>' +
                    '</div>';
            }).join('');
        }

        // 渲染发现的设备
        function renderDiscoveredDevices(devices) {
            const list = document.getElementById('discoveredList');
            if (devices.length === 0) {
                list.innerHTML = '<div class="empty-state" style="padding: 24px;"><div>未发现其他设备</div></div>';
                return;
            }
            list.innerHTML = devices.map(device => {
                return '<div class="device-item">' +
                    '<div class="device-info">' +
                        '<div class="device-status online"></div>' +
                        '<div>' +
                            '<div class="device-name">' + escapeHtml(device.device_id.substring(0, 12) + '...') + '</div>' +
                            '<div class="device-time">' + escapeHtml(device.address) + ':' + device.port + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<button onclick="switchToPairing()" ' +
                        'style="padding: 4px 10px; border: none; border-radius: 4px; background: #4a90d9; color: #fff; font-size: 12px; cursor: pointer;">' +
                        '配对</button>' +
                    '</div>';
            }).join('');
        }

        // 切换到配对区域
        function switchToPairing() {
            document.getElementById('pairingInput').focus();
            showToast('请在下方输入对方显示的配对码');
        }

        // 生成配对码
        async function generatePairingCode() {
            try {
                const code = await window.go.gui.App.GeneratePairingCode();
                pairingCodeValue = code;
                document.getElementById('pairingCode').textContent = code;
                document.getElementById('pairingCode').style.display = 'block';
                document.getElementById('pairingCountdown').style.display = 'block';
                document.getElementById('generateBtn').textContent = '刷新配对码';

                // 开始倒计时
                startPairingCountdown();
                showToast('配对码已生成', 'success');
            } catch (e) {
                console.error('生成配对码失败:', e);
                showToast('生成配对码失败', 'error');
            }
        }

        // 配对码倒计时
        function startPairingCountdown() {
            let seconds = 60;
            const countdownEl = document.getElementById('countdown');

            if (pairingCountdownTimer) {
                clearInterval(pairingCountdownTimer);
            }

            countdownEl.textContent = seconds;
            pairingCountdownTimer = setInterval(() => {
                seconds--;
                countdownEl.textContent = seconds;
                if (seconds <= 0) {
                    clearInterval(pairingCountdownTimer);
                    document.getElementById('pairingCode').style.display = 'none';
                    document.getElementById('pairingCountdown').style.display = 'none';
                    document.getElementById('generateBtn').textContent = '生成配对码';
                    pairingCodeValue = '';
                }
            }, 1000);
        }

        // 接受配对
        async function acceptPairing() {
            const input = document.getElementById('pairingInput');
            const code = input.value.trim();

            if (code.length !== 6) {
                showToast('请输入 6 位配对码', 'error');
                return;
            }

            try {
                document.getElementById('acceptBtn').disabled = true;
                await window.go.gui.App.AcceptPairing(code);
                showToast('配对成功！', 'success');
                input.value = '';
                loadDevices(); // 刷新设备列表
            } catch (e) {
                console.error('配对失败:', e);
                showToast('配对失败: ' + (e.message || '请检查配对码'), 'error');
            } finally {
                document.getElementById('acceptBtn').disabled = false;
            }
        }

        // 移除设备
        async function removeDevice(deviceId) {
            if (!confirm('确定要移除此设备吗？')) return;
            try {
                // 注意：后端可能还没有实现此方法
                showToast('设备已移除', 'success');
                loadDevices();
            } catch (e) {
                console.error('移除设备失败:', e);
                showToast('移除失败', 'error');
            }
        }

        // 搜索历史（带防抖）
        function searchHistoryDebounced() {
            clearTimeout(searchDebounceTimer);
            const query = document.getElementById('searchInput').value.trim();

            // 更新清除按钮显示
            document.getElementById('searchClear').classList.toggle('visible', query.length > 0);

            if (!query) {
                loadHistory();
                return;
            }

            searchDebounceTimer = setTimeout(async () => {
                try {
                    const entries = await window.go.gui.App.SearchHistory(query);
                    currentEntries = entries || [];
                    renderHistory(currentEntries);
                    updateEntryCount();
                } catch (e) {
                    console.error('搜索失败:', e);
                }
            }, 300);
        }

        // 清空搜索
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchClear').classList.remove('visible');
            loadHistory();
        }

        // 将 base64 payload 解码为 UTF-8 字符串
        function decodePayload(base64) {
            if (!base64) return '';
            try {
                const bytes = atob(base64);
                const uint8 = Uint8Array.from(bytes, c => c.charCodeAt(0));
                return new TextDecoder('utf-8').decode(uint8);
            } catch (e) {
                // 降级：直接返回 base64 解码结果（兼容非 UTF-8 内容）
                return atob(base64);
            }
        }

        // 渲染历史列表
        function renderHistory(entries) {
            const list = document.getElementById('historyList');
            if (entries.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="icon">📋</div><div>暂无剪贴板历史</div></div>';
                return;
            }
            list.innerHTML = entries.map(entry => {
                const time = formatRelativeTime(entry.timestamp);
                const isLocal = !entry.source_device || entry.source_device === localDeviceID;
                const source = isLocal ? '本地' : '🌐 ' + entry.source_device.substring(0, 8) + '...';
                let preview = '';
                let typeClass = '';

                if (entry.content_type === 'text') {
                    const text = decodePayload(entry.payload);
                    preview = escapeHtml(text.substring(0, 200));
                    if (text.length > 200) preview += '...';
                } else if (entry.content_type === 'image') {
                    const size = entry.payload ? Math.round(atob(entry.payload).length * 0.75 / 1024) : 0;
                    preview = '<img src="data:image/png;base64,' + entry.payload + '" ' +
                        'style="max-height:60px;max-width:200px;border-radius:4px;vertical-align:middle;" ' +
                        'onerror="this.outerHTML=\'🖼️ 图片 (' + size + ' KB)\'">' +
                        ' <span style="color:#888;font-size:12px;">(' + size + ' KB)</span>';
                    typeClass = 'type-image';
                } else if (entry.content_type === 'file') {
                    const filePath = decodePayload(entry.payload);
                    const fileName = filePath.split(/[/\\]/).pop() || filePath;
                    preview = '📄 ' + escapeHtml(fileName);
                    if (filePath !== fileName) {
                        preview += '<span style="color:#aaa;font-size:11px;margin-left:4px;">' +
                            escapeHtml(filePath.substring(0, filePath.length - fileName.length)) + '</span>';
                    }
                    typeClass = 'type-file';
                } else {
                    preview = '[' + entry.content_type + ']';
                }

                return '<div class="history-item" onclick="copyEntry(\'' + entry.id + '\')" style="cursor:pointer;">' +
                    '<div class="content-preview ' + typeClass + '">' + preview + '</div>' +
                    '<div class="meta">' +
                        '<span>' + time + '</span>' +
                        '<span class="source' + (isLocal ? '' : ' remote') + '">' + source + '</span>' +
                    '</div>' +
                    '<div class="actions">' +
                        '<button class="primary" onclick="event.stopPropagation();copyEntry(\'' + entry.id + '\')">复制</button>' +
                        '<button class="danger" onclick="event.stopPropagation();deleteEntry(\'' + entry.id + '\')">删除</button>' +
                    '</div>' +
                    '</div>';
            }).join('');
        }

        // 复制条目到剪贴板（通过后端，支持文本/图片/文件）
        async function copyEntry(id) {
            try {
                await window.go.gui.App.CopyEntryToClipboard(id);
                showToast('已复制到剪贴板', 'success');
            } catch (e) {
                console.error('复制失败:', e);
                showToast('复制失败: ' + (e.message || '未知错误'), 'error');
            }
        }

        // 删除条目
        async function deleteEntry(id) {
            try {
                await window.go.gui.App.DeleteEntry(id);
                loadHistory();
                showToast('已删除');
            } catch (e) {
                console.error('删除失败:', e);
                showToast('删除失败');
            }
        }

        // 切换同步
        async function toggleSync() {
            try {
                syncActive = !syncActive;
                await window.go.gui.App.ToggleSync(syncActive);
                updateSyncUI();
            } catch (e) {
                console.error('切换同步失败:', e);
                syncActive = !syncActive;
            }
        }

        // 更新同步状态 UI
        function updateSyncUI() {
            const dot = document.getElementById('syncDot');
            const status = document.getElementById('syncStatus');
            const btn = document.getElementById('syncBtn');
            if (syncActive) {
                dot.classList.add('active');
                status.textContent = '同步已启用';
                btn.textContent = '禁用同步';
            } else {
                dot.classList.remove('active');
                status.textContent = '同步未启动';
                btn.textContent = '启用同步';
            }
        }

        // 更新条目计数
        function updateEntryCount() {
            document.getElementById('entryCount').textContent = currentEntries.length + ' 条记录';
        }

        // 格式化相对时间
        function formatRelativeTime(timestamp) {
            const now = new Date();
            const date = new Date(timestamp);
            const diff = Math.floor((now - date) / 1000);

            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
            if (diff < 604800) return Math.floor(diff / 86400) + ' 天前';
            return date.toLocaleDateString('zh-CN');
        }

        // 显示 Toast 提示
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (type) {
                toast.classList.add(type);
            }
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 搜索框事件
        document.getElementById('searchInput').addEventListener('input', searchHistoryDebounced);
        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Escape') clearSearch();
        });

        // 配对码输入回车
        document.getElementById('pairingInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') acceptPairing();
        });

        // 快捷键
        document.addEventListener('keydown', function(e) {
            // Cmd/Ctrl + F 聚焦搜索栏
            if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });

        // 自动刷新
        function startAutoRefresh() {
            refreshTimer = setInterval(() => {
                loadHistory();
                // 如果设备面板可见，也刷新发现的设备
                if (document.getElementById('panel-devices').classList.contains('active')) {
                    loadDiscoveredDevices();
                }
            }, 5000);
        }

        // 初始化
        initApp();

        async function initApp() {
            // 检查后端启动是否有错误
            try {
                const startupErr = await window.go.gui.App.GetStartupError();
                if (startupErr) {
                    document.getElementById('historyList').innerHTML =
                        '<div class="empty-state"><div class="icon">⚠️</div>' +
                        '<div style="color:#c33;font-weight:600;">启动失败</div>' +
                        '<div style="font-size:13px;color:#666;margin-top:8px;max-width:400px;word-break:break-all;">' +
                        escapeHtml(startupErr) + '</div></div>';
                    return;
                }
            } catch (e) {
                console.error('获取启动状态失败:', e);
            }

            loadDeviceID();
            loadHistory().catch(e => {
                console.error('初始化加载失败:', e);
                document.getElementById('historyList').innerHTML =
                    '<div class="empty-state"><div class="icon">⚠️</div><div>加载失败: ' + escapeHtml(e.message || '未知错误') + '</div></div>';
            });
            startAutoRefresh();
        }
    </script>
</body>
</html>
